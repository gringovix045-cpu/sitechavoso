<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* FUNDO PRETO */
body {
    background: #000000;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 1000px;
    text-align: center;
}

/* HEADER PRETO COM DETALHES BRANCOS */
.header {
    margin-bottom: 40px;
    padding: 20px;
    background: #111111;
    border: 2px solid #ffffff;
    border-radius: 15px;
    color: white;
}

/* LOGO */
.logo {
    font-size: 3rem;
    color: #ffffff;
    margin-bottom: 10px;
}

/* TÍTULO */
h1 {
    color: white;
}

/* INFO WHATS */
.whatsapp-info {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    color: white;
    margin-top: 10px;
    border: 1px solid #ffffff;
}

/* GRID */
.buttons-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* BOTÕES VERMELHOS */
.service-button {
    background: #c40000;
    border: 2px solid #ffffff;
    border-radius: 15px;
    padding: 25px;
    color: #ffffff;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255,255,255,0.08);
}

/* HOVER */
.service-button:hover {
    background: #ff1a1a;
    color: #ffffff;
    transform: translateY(-3px);
}

/* ÍCONES */
.button-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    color: #ffffff;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    background: #111111;
    padding: 20px;
    border-radius: 10px;
    color: white;
    border: 2px solid #ffffff;
}

/* LINKS */
.footer-link {
    color: #ffffff;
    text-decoration: none;
    margin: 10px;
    display: inline-block;
    font-weight: bold;
}

.footer-link:hover {
    color: #ff4d4d;
}
</style>
